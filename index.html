<!DOCTYPE html>
<html>

<head>
    <title>VVK Salon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #0d0d0d;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .title {
            color: #d4af37;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .menu {
            width: 32px;
            height: 32px;
            cursor: pointer;
            color: #d4af37;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu:hover {
            transform: scale(1.1);
            color: #ffffff;
        }

        .menu svg {
            width: 28px;
            height: 28px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.15);
        }

        .highlight {
            border: 1px solid #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .full {
            grid-column: span 2;
        }

        .label {
            color: #888;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .value {
            font-size: 32px;
            margin: 0;
            font-weight: bold;
            color: #fff;
        }

        .inc {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            font-size: 13px;
            margin-top: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        input,
        select,
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
            /* Fix width issues */
        }

        input:focus,
        select:focus {
            border-color: #d4af37;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
            background: #1e1e1e;
        }

        button {
            background: linear-gradient(135deg, #d4af37, #c5a028);
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(135deg, #ebd26a, #d4af37);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .header-center {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .date-box {
            font-size: 14px;
            color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            margin-top: 5px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* TABLE STYLES FROM DATA.HTML */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 15px;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #1a1a1a;
        }

        th,
        td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        th {
            background: #222;
            color: #d4af37;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr {
            transition: background 0.2s;
        }

        tr:hover td {
            background: #2a2a2a;
            color: #fff;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .grid {
                grid-template-columns: 1fr 1fr;
                /* 2 Columns for mobile */
                gap: 10px;
                /* Reduced gap */
            }

            .full {
                grid-column: span 2;
                /* Full width for Total & Table */
            }

            .card {
                padding: 15px;
                text-align: center;
                /* Center align for better look */
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .title {
                font-size: 24px;
            }

            .menu {
                font-size: 28px;
            }

            .label {
                font-size: 14px;
                margin-bottom: 5px;
            }

            .value {
                font-size: 32px;
                /* Reduced to fit 2 columns */
            }

            .inc {
                font-size: 13px;
                padding: 4px 8px;
            }

            /* Inputs and Buttons */
            input,
            select,
            button {
                font-size: 16px;
                padding: 12px;
            }

            /* Table - Ensure all columns are visible on mobile */
            th,
            td {
                padding: 10px 8px;
                font-size: 13px;
                white-space: nowrap; /* Prevent columns from shrinking too much */
            }

            .card.full {
                align-items: flex-start; /* Fix: Ensure content starts from left, not center */
                overflow-x: auto; /* Ensure horizontal scroll works */
                -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
            }

            table {
                width: auto; /* Allow table to define its own width */
                min-width: 100%; /* At least full width */
                text-align: left; /* Better readability on mobile */
            }
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="top">
        <div></div> <!-- Spacer for layout balance if needed, or remove -->
        <div class="header-center">
            <div class="title">VVK SALON</div>
            <div id="dateBox" class="date-box"></div>
        </div>
        <div class="menu" onclick="goData()">
            <svg viewBox="0 0 24 24">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"></path>
            </svg>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="grid">

        <div class="card">
            <div class="label">ALI TOTAL</div>
            <div class="value">Rs. <span id="aliTotal">0</span></div>
            <div class="inc">INCENTIVE Rs. <span id="aliInc">0</span></div>
        </div>

        <div class="card highlight">
            <div class="label">SAMEER TOTAL</div>
            <div class="value">Rs. <span id="sameerTotal">0</span></div>
            <div class="inc">INCENTIVE Rs. <span id="sameerInc">0</span></div>
        </div>

        <div class="card">
            <div class="label">GPAY</div>
            <div class="value">Rs. <span id="gpay">0</span></div>
        </div>

        <div class="card">
            <div class="label">CASH</div>
            <div class="value">Rs. <span id="cash">0</span></div>
        </div>

        <div class="card full">
            <div class="label">TOTAL</div>
            <div class="value">Rs. <span id="total">0</span></div>
        </div>

    </div>

    <!-- ENTRY FORM -->
    <div class="card full" style="margin-top:20px">
        <div class="label" style="color:#d4af37;text-align:center;font-size:18px">
            NEW ENTRY
        </div>

        <input id="sno" placeholder="S.No">
        <select id="worker">
            <option value="">Employee</option>
            <option>ALI</option>
            <option>SAMEER</option>
        </select>

        <input id="mobile" placeholder="Mobile Number">
        <input id="service" placeholder="Service">
        <input id="amount" placeholder="Amount">
        <input id="incentive" placeholder="Incentive" style="display:none">

        <select id="mode">
            <option value="">Payment Mode</option>
            <option>CASH</option>
            <option>GPAY</option>
        </select>

        <!-- IMPORTANT: button has ID -->
        <button id="submitBtn" onclick="submitData()">SUBMIT</button>
    </div>

    <!-- DATA TABLE SECTION -->
    <div class="card full" style="margin-top:20px; overflow-x:auto;">
        <div class="label" style="color:#d4af37;text-align:center;font-size:18px; margin-bottom:15px">
            ENTRIES
        </div>
        <table id="tbl">
            <!-- Data will be loaded here -->
        </table>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbw3WRui3crFLTibeet9SO6urIvPkV9CSi1Jf5ku_fJJQ5K3KS7i9O1t-QaNHNL1ziLbzg/exec";

        let isSubmitting = false;

        function getVal(id) {
            return document.getElementById(id).value.trim();
        }

        function submitData() {

            if (isSubmitting) return;

            const sno = getVal("sno");
            const worker = getVal("worker");
            const mobile = getVal("mobile");
            const service = getVal("service");
            const amount = getVal("amount");
            const incentive = getVal("incentive") || 0;
            const mode = getVal("mode");

            // VALIDATION
            if (!sno || isNaN(sno)) {
                alert("Enter valid S.No");
                return;
            }

            if (!worker) {
                alert("Select employee");
                return;
            }

            if (mobile && !/^[0-9]{10}$/.test(mobile)) {
                alert("Enter valid 10 digit mobile");
                return;
            }

            if (!service) {
                alert("Enter service");
                return;
            }

            if (!amount || isNaN(amount) || Number(amount) <= 0) {
                alert("Enter valid amount");
                return;
            }

            if (!mode) {
                alert("Select payment mode");
                return;
            }

            isSubmitting = true;
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "Saving...";

            fetch(API, {
                method: "POST",
                body: JSON.stringify({
                    action: "addEntry",
                    sno: Number(sno),
                    worker: worker,
                    mobile: mobile,
                    service: service,
                    amount: Number(amount),
                    incentive: Number(incentive),
                    mode: mode
                })
            })
                .then(() => {
                    clearForm();
                    loadDashboard();
                    loadData();
                })
                .catch(() => alert("Network error"))
                .finally(() => {
                    isSubmitting = false;
                    btn.disabled = false;
                    btn.innerText = "SUBMIT";
                });
        }

        let pressTimer;

        function startPress(e, sno) {
            pressTimer = window.setTimeout(function () {
                deleteRow(sno);
            }, 800); // 800ms duration for long press
        }

        function endPress() {
            clearTimeout(pressTimer);
        }

        function deleteRow(sno) {
            if (!confirm(`Do you want to delete entry ${sno} and confirm?`)) return;

            fetch(API, {
                method: "POST",
                body: JSON.stringify({
                    action: "deleteEntry",
                    sno: sno
                })
            })
                .then(() => {
                    loadDashboard();
                    loadData();
                });
        }

        function clearForm() {
            document.getElementById("sno").value = "";
            document.getElementById("worker").value = "";
            document.getElementById("mobile").value = "";
            document.getElementById("service").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("incentive").value = "";
            document.getElementById("mode").value = "";
        }

        function loadDashboard() {
            fetch(API + "?action=getDashboard")
                .then(r => r.json())
                .then(d => {
                    gpay.innerText = d.gpay;
                    cash.innerText = d.cash;
                    total.innerText = d.total;
                    aliTotal.innerText = d.aliTotal;
                    sameerTotal.innerText = d.sameerTotal;
                    aliInc.innerText = d.aliInc;
                    sameerInc.innerText = d.sameerInc;
                });
        }

        function loadData() {
            fetch(API + "?action=getData")
                .then(r => r.json())
                .then(rows => {
                    let html = `
   <tr>
     <th>S.No</th>
     <th>Worker</th>
     <th>Mobile</th>
     <th>Service</th>
     <th>Amount</th>
     <th>Mode</th>
     <th>Incentive</th>
   </tr>`;

                    rows.forEach(r => {
                        html += `
     <tr ontouchstart="startPress(event, ${r[0]})" 
         ontouchend="endPress()" 
         ontouchmove="endPress()"
         onmousedown="startPress(event, ${r[0]})" 
         onmouseup="endPress()" 
         oncontextmenu="return false">
       ${r.map(c => `<td>${c}</td>`).join("")}
     </tr>`;
                    });

                    document.getElementById("tbl").innerHTML = html;
                });
        }

        function updateDate() {
            const now = new Date();
            const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];

            const dayName = days[now.getDay()];
            const day = String(now.getDate()).padStart(2, '0');
            const month = months[now.getMonth()];
            const year = now.getFullYear();

            document.getElementById("dateBox").innerText = `${day} ${month} ${year} | ${dayName}`;
        }

        updateDate();
        loadDashboard();
        loadData();

        // incentive logic
        const amountInput = document.getElementById("amount");
        const incentiveInput = document.getElementById("incentive");

        amountInput.addEventListener("input", function () {
            if (Number(this.value) >= 500) {
                incentiveInput.style.display = "block";
            } else {
                incentiveInput.style.display = "none";
                incentiveInput.value = "";
            }
        });
    </script>

</body>

</html>
